rules:
  - DOMAIN-SUFFIX,x39x.cc,DIRECT
  - GEOSITE,category-ads-all,REJECT
    # AI
  - RULE-SET,ai_non_ip,AI
  - GEOSITE,category-ai-!cn,AI
    # stream
  - RULE-SET,stream_cn,MEDIA-CN
  - RULE-SET,stream_non_ip,MEDIA
    # google apple ms
  - GEOSITE,google-cn,PROXY # Google CN 不走代理会导致香港等地区节点 Play Store 异常
  - RULE-SET,apple_services,Apple
  - RULE-SET,apple_ai,Apple
  - RULE-SET,microsoft_non_ip,Apple
  - RULE-SET,apple_cdn,Apple-CN
  - RULE-SET,apple_cn_non_ip,Apple-CN
  - RULE-SET,microsoft_cdn_non_ip,Apple-CN
    # fallback
  - RULE-SET,global_non_ip,PROXY
  - RULE-SET,direct_non_ip,DIRECT
  - RULE-SET,domestic_non_ip,DIRECT
  - GEOSITE,gfw,PROXY
  - GEOSITE,cn,DIRECT
  - GEOSITE,geolocation-!cn,PROXY
    # lan
  - RULE-SET,lan_non_ip,DIRECT
  - GEOSITE,private,DIRECT

  # NOTE: ip
  - RULE-SET,lan_ip,DIRECT,no-resolve # lan 不用dns 解析
  - GEOIP,private,DIRECT,no-resolve

  - RULE-SET,apple_services_ip,Apple
  - RULE-SET,stream_ip,MEDIA

  - RULE-SET,china_ip,DIRECT
  - RULE-SET,china_ip_ipv6,DIRECT
  - GEOIP,cn,DIRECT
  - MATCH,PROXY
