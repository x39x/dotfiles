# NOTE:
# example: https://github.com/MetaCubeX/mihomo/blob/Meta/docs/config.yaml
# doc: https://wiki.metacubex.one/config/
# geosite 中 @cn 表示国内提供服务的域名，如 apple@cn 等，此类型推荐走直连

mixed-port: 9393 # HTTP(S) 和 SOCKS 代理混合端口
redir-port: 9392 # 透明代理端口，用于 Linux 和 MacOS
mode: rule
allow-lan: false # 局域网连接

geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"
geo-auto-update: true
geo-update-interval: 24 # 更新间隔，单位：小时

log-level: info
ipv6: true

external-controller: 0.0.0.0:9391
external-controller-unix: mihomo.sock
external-ui-url: "https://github.com/MetaCubeX/Yacd-meta/archive/gh-pages.zip"
# external-ui: ./ui
# external-ui-name: yacd

profile:
  store-selected: true # 储存 API 对策略组的选择，以供下次启动时使用
  store-fake-ip: true # 储存 fakeip 映射表，域名再次发生连接时，使用原有映射地址

tun:
  enable: true
  # system 使用系统协议栈，可以提供更稳定/全面的 tun 体验，且占用相对其他堆栈更低
  # gvisor 通过在用户空间中实现网络协议栈，可以提供更高的安全性和隔离性，同时可以避免操作系统内核和用户空间之间的切换，从而在特定情况下具有更好的网络处理性能
  # mixed 混合堆栈，tcp 使用 system栈，udp 使用 gvisor栈，使用体验可能相对更好
  stack: mixed
  # 劫持所有dns解析请求
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# NOTE: Clash DNS 请求逻辑：https://wiki.metacubex.one/config/dns/diagram/#_3
# (1) 当访问一个域名时， nameserver 与 fallback 列表内的所有服务器并发请求，得到域名对应的 IP 地址。
# (2) clash 将选取 nameserver 列表内，解析最快的结果。
# (3) 若解析结果中，IP 地址属于 国外，那么 Clash 将选择 fallback 列表内，解析最快的结果。
# 注意：
# (1) 如果您为了确保 DNS 解析结果无污染，请仅保留列表内以 tls:// 开头的 DNS 服务器，但是通常对于国内没有太大必要。
# (2) 如果您不在乎可能解析到污染的结果，更加追求速度。请将 nameserver 列表的服务器插入至 fallback 列表内，并移除重复项。
dns:
  enable: true
  ipv6: true
  use-system-hosts: false # 是否查询系统 hosts
  prefer-h3: true # true 会导致国内 DNS 解析慢
  ipv6-timeout: 300
  # 启用 DNS 服务并让其在 53 端口（这是绝大多数操作系统将 DNS 解析报文发送到的端口）监听来自任意网络界面的 DNS 请求。
  # 如果你的设备并不需要向其他设备提供解析服务 将0.0.0.0:53 改为 127.0.0.1:53 仅监听本机的 DNS 解析报文。
  # 使用docker等容器时，需要设置为0.0.0.0:53，否则会直接丢弃容器内的dns请求
  listen: 0.0.0.0:53
  # https://zhuanlan.zhihu.com/p/1949616192567357697
  # 用于解析 nameserver，fallback 以及其他 DNS 服务器配置的DNS 服务域名
  # 只能使用纯 IP 地址，可使用加密 DNS
  default-nameserver:
    - 223.5.5.5 #ali
    - tls://223.5.5.5:853
    - 119.29.29.29 #tencent
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  # 黑名单模式 fake-ip-filter 里的不会返回fakeip
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    [
      "*.lan",
      "stun.*.*.*",
      "stun.*.*",
      time.windows.com,
      time.nist.gov,
      time.apple.com,
      time.asia.apple.com,
      "*.ntp.org.cn",
      "*.openwrt.pool.ntp.org",
      time1.cloud.tencent.com,
      time.ustc.edu.cn,
      pool.ntp.org,
      ntp.ubuntu.com,
      ntp.aliyun.com,
      ntp1.aliyun.com,
      ntp2.aliyun.com,
      ntp3.aliyun.com,
      ntp4.aliyun.com,
      ntp5.aliyun.com,
      ntp6.aliyun.com,
      ntp7.aliyun.com,
      time1.aliyun.com,
      time2.aliyun.com,
      time3.aliyun.com,
      time4.aliyun.com,
      time5.aliyun.com,
      time6.aliyun.com,
      time7.aliyun.com,
      "*.time.edu.cn",
      time1.apple.com,
      time2.apple.com,
      time3.apple.com,
      time4.apple.com,
      time5.apple.com,
      time6.apple.com,
      time7.apple.com,
      time1.google.com,
      time2.google.com,
      time3.google.com,
      time4.google.com,
      music.163.com,
      "*.music.163.com",
      "*.126.net",
      musicapi.taihe.com,
      music.taihe.com,
      songsearch.kugou.com,
      trackercdn.kugou.com,
      "*.kuwo.cn",
      api-jooxtt.sanook.com,
      api.joox.com,
      joox.com,
      y.qq.com,
      "*.y.qq.com",
      streamoc.music.tc.qq.com,
      mobileoc.music.tc.qq.com,
      isure.stream.qqmusic.qq.com,
      dl.stream.qqmusic.qq.com,
      aqqmusic.tc.qq.com,
      amobile.music.tc.qq.com,
      "*.xiami.com",
      "*.music.migu.cn",
      music.migu.cn,
      "*.msftconnecttest.com",
      "*.msftncsi.com",
      localhost.ptlogin2.qq.com,
      "*.*.*.srv.nintendo.net",
      "*.*.stun.playstation.net",
      "xbox.*.*.microsoft.com",
      "*.ipv6.microsoft.com",
      "*.*.xboxlive.com",
      speedtest.cros.wr.pvp.net,
    ]
  # 代理节点域名解析服务器，仅用于解析代理节点的域名
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  # 优先于 nameserver/fallback 查询 可使用 geosite
  nameserver-policy:
    "geosite:cn,private,apple@cn": # apple@cn
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:!cn,!private":
      - "tls://cloudflare-dns.com"
      - "tls://dns.google"
  nameserver:
    - "tls://1.1.1.1#dns"
    - "tls://8.8.4.4#dns"
  # 用于 direct 出口域名解析的 DNS 服务器，如果不填则遵循 nameserver-policy、nameserver 和 fallback 的配置
  direct-nameserver:
    # - system
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # fake ip 不需要配置fallback, redir-host遗留产物

