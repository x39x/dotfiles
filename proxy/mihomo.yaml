proxy-groups:
  - name: cuckoo
    type: select
    use:
      - provider1

  - name: godwit
    type: select
    use:
      - provider2

  - name: gull
    type: select
    use:
      - provider3

  - name: urltest
    type: url-test
    use:
      - provider1

  - name: tern
    type: select
    proxies: [urltest, cuckoo, godwit, gull]

  - name: ai
    type: select
    proxies: [tern, gull, godwit, cuckoo]

  - name: stream
    type: select
    proxies: [tern, cuckoo, godwit, gull]

  - name: stream-cn
    type: select
    proxies: [DIRECT, cuckoo, godwit, gull]

  - name: apple
    type: select
    proxies: [tern, cuckoo, godwit, gull, DIRECT]

  - name: apple-cn
    type: select
    proxies: [DIRECT, cuckoo, godwit, gull]

